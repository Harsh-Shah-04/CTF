# CTFd with local Supabase PostgreSQL (no MariaDB).
#
# Prerequisites:
#   1. Docker Desktop running
#   2. Local Supabase: npx supabase start
#   3. Copy .env.example to .env and set keys from: npx supabase status
#
# Usage:
#   docker compose -f docker-compose.supabase.yml up --build

services:
  ctfd:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/ctfd}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
      - .:/opt/CTFd:ro
    depends_on:
      permissions:
        condition: service_completed_successfully
      cache:
        condition: service_started
    networks:
      default:
      internal:

  permissions:
    image: alpine:3.23
    user: root
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
    command: chown -R 1001:1001 /var/uploads /var/log/CTFd

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/http.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    depends_on:
      - ctfd

  cache:
    image: redis:4
    restart: always
    volumes:
      - .data/redis:/data
    networks:
      internal:

networks:
  default:
  internal:
    internal: true
